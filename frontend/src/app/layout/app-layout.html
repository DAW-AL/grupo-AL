<div class="layout-wrapper">
  <aside class="sidebar" [class.expandido]="sidebarExpandido()" [class.colapsado]="!sidebarExpandido()">

    <div class="sidebar-header">
      <img *ngIf="sidebarExpandido()" src="/logo.svg" alt="Logo" class="sidebar-logo" />
      <img *ngIf="!sidebarExpandido()" src="/logo-small.svg" alt="Logo" class="sidebar-logo-small" />
    </div>

 <button
  class="toggle-btn"
  (click)="toggleSidebar()"
  [title]="sidebarExpandido() ? 'Colapsar menú' : 'Expandir menú'">

  <i
    class="pi"
    [ngClass]="sidebarExpandido() ? 'pi-angle-left' : 'pi-angle-right'">
  </i>

  <span *ngIf="sidebarExpandido()"></span>
</button>

    <nav class="sidebar-nav">
      <p class="sidebar-section-label" *ngIf="sidebarExpandido()">PRINCIPAL</p>
      <ul>
        <li>
          <a routerLink="/inicio" routerLinkActive="active" [title]="!sidebarExpandido() ? 'Inicio' : ''">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span *ngIf="sidebarExpandido()">Inicio</span>
          </a>
        </li>
        <li>
          <a routerLink="/proyectos" routerLinkActive="active" [title]="!sidebarExpandido() ? 'Proyectos' : ''">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <span *ngIf="sidebarExpandido()">Proyectos</span>
          </a>
        </li>
        <li>
          <a routerLink="/clientes" routerLinkActive="active" [title]="!sidebarExpandido() ? 'Clientes' : ''">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span *ngIf="sidebarExpandido()">Clientes</span>
          </a>
        </li>
        <li *ngIf="esAdmin">
          <a routerLink="/usuarios" routerLinkActive="active" [title]="!sidebarExpandido() ? 'Usuarios' : ''">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <span *ngIf="sidebarExpandido()">Usuarios</span>
          </a>
        </li>
        <li *ngIf="esAdmin">
          <a routerLink="/historial" routerLinkActive="active" [title]="!sidebarExpandido() ? 'Historial' : ''">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span *ngIf="sidebarExpandido()">Historial</span>
          </a>
        </li>

      </ul>
    </nav>

            <div class="logout-item">

  <a
    (click)="cerrarSesion()"
    style="cursor:pointer"
    [title]="!sidebarExpandido() ? 'Cerrar sesión' : ''">

    <svg width="18"
         height="18"
         viewBox="0 0 24 24"
         fill="none"
         stroke="currentColor"
         stroke-width="2">

      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>

      <polyline points="16 17 21 12 16 7"/>

      <line x1="21"
            y1="12"
            x2="9"
            y2="12"/>

    </svg>

    <span *ngIf="sidebarExpandido()">
      Cerrar sesión
    </span>

  </a>

</div>

<div class="sidebar-footer" routerLink="/perfil" style="cursor:pointer">
  <div class="user-avatar" *ngIf="!fotoUrl()">
    {{ usuarioInicial }}
  </div>
  <img *ngIf="fotoUrl()" [src]="fotoUrl()" class="user-avatar-foto" alt="foto" />
  <span class="user-name" *ngIf="sidebarExpandido()">
    {{ usuarioNombre }}
  </span>
</div>

  </aside>

  <main class="main-content">
    <router-outlet />
  </main>

</div>
