<p-toast />

<div class="page-wrapper">
  <div class="page-header">
    <h1 class="page-title">Historial de cambios</h1>
    <div class="header-actions">
      <div class="filter-group">
        <span>Entidad:</span>
        <p-select
          [options]="entidadOpciones"
          optionLabel="label"
          optionValue="value"
          placeholder="Todas"
          [(ngModel)]="filtroEntidad"
          (ngModelChange)="onFiltroChange($event)" />
      </div>
    </div>
  </div>

  <div class="table-container">
    <div class="table-loading" *ngIf="loading()"><div class="spinner"></div></div>

    <table class="data-table" *ngIf="!loading()">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Entidad</th>
          <th>Acción</th>
          <th>Usuario</th>
          <th>Descripción</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let h of filtrados()">
          <td data-label="Fecha" class="col-fecha">{{ formatFecha(h.fechaCambio) }}</td>
          <td data-label="Entidad"><span class="entidad-tag">{{ h.entidad }} #{{ h.entidadId }}</span></td>
          <td data-label="Acción"><span class="accion-badge" [class]="accionClass(h.accion)">{{ h.accion }}</span></td>
          <td data-label="Usuario" class="col-usuario">{{ h.usuarioNombre }}</td>
          <td data-label="Descripción" class="col-desc">{{ h.descripcion }}</td>
        </tr>
        <tr *ngIf="sinResultados()">
          <td colspan="5" class="empty-state">No hay registros en el historial.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
